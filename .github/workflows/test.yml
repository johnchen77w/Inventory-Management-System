name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventory
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: inventory_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://inventory:secret@localhost:5432/inventory_test_db
          JWT_SECRET: test-secret-key-for-ci-at-least-32-chars
          REDIS_URL: redis://localhost:6379
          DEFAULT_ADMIN_EMAIL: admin@test.com
          DEFAULT_ADMIN_PASSWORD: testadmin123
          DEFAULT_ADMIN_NAME: Test Admin
          ENVIRONMENT: test
        run: |
          pytest --cov=app tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/test-results.xml
