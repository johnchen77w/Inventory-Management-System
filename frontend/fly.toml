# Fly.io configuration for the Next.js frontend
# Deploy with: fly deploy --config fly.frontend.toml
#
# Prerequisites:
#   fly apps create inventory-app

app = "ece1779-inventory-app"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://ece1779-inventory-api.fly.dev"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/"
    interval = "30s"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
