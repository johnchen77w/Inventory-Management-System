apiVersion: v1
kind: Service
metadata:
  name: inventory-frontend
  namespace: inventory
  labels:
    app: inventory-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: inventory-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-frontend
  namespace: inventory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-frontend
  template:
    metadata:
      labels:
        app: inventory-frontend
    spec:
      containers:
        - name: frontend
          image: inventory-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          # NOTE: NEXT_PUBLIC_API_URL is baked in at Docker build time.
          # Build with: docker build --build-arg NEXT_PUBLIC_API_URL=http://<api-lb-ip> -t inventory-frontend:latest ./frontend
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
