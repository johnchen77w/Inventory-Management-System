apiVersion: v1
kind: Secret
metadata:
  name: inventory-secrets
  namespace: inventory
type: Opaque
# NOTE: All values must be base64 encoded.
# Encode with: echo -n 'value' | base64
# Decode with: echo 'encoded_value' | base64 -d
#
# IMPORTANT: Replace placeholder values with real production secrets before applying.
data:
  # postgresql://inventory:secret@postgres:5432/inventory_db
  DATABASE_URL: cG9zdGdyZXNxbDovL2ludmVudG9yeTpzZWNyZXRAcG9zdGdyZXM6NTQzMi9pbnZlbnRvcnlfZGI=
  # change-me-to-a-long-random-string-at-least-32-chars
  JWT_SECRET: Y2hhbmdlLW1lLXRvLWEtbG9uZy1yYW5kb20tc3RyaW5nLWF0LWxlYXN0LTMyLWNoYXJz
  # inventory
  POSTGRES_USER: aW52ZW50b3J5
  # secret
  POSTGRES_PASSWORD: c2VjcmV0
  # inventory_db
  POSTGRES_DB: aW52ZW50b3J5X2Ri
  # redis://redis:6379
  REDIS_URL: cmVkaXM6Ly9yZWRpczo2Mzc5
  # admin@example.com
  DEFAULT_ADMIN_EMAIL: YWRtaW5AZXhhbXBsZS5jb20=
  # admin123
  DEFAULT_ADMIN_PASSWORD: YWRtaW4xMjM=
  # System Admin
  DEFAULT_ADMIN_NAME: U3lzdGVtIEFkbWlu
  # (empty - configure for production)
  SENDGRID_API_KEY: ""
  # alerts@inventory-app.com
  ALERT_FROM_EMAIL: YWxlcnRzQGludmVudG9yeS1hcHAuY29t
  # (empty - configure after deploying serverless function)
  LOW_STOCK_FUNCTION_URL: ""
