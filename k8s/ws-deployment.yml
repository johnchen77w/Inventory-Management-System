apiVersion: v1
kind: Service
metadata:
  name: inventory-ws
  namespace: inventory
  labels:
    app: inventory-ws
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: inventory-ws
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-ws
  namespace: inventory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-ws
  template:
    metadata:
      labels:
        app: inventory-ws
    spec:
      containers:
        - name: ws
          image: inventory-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          # WebSocket servers must run single-worker (connections are stateful per process).
          # Redis Pub/Sub handles cross-replica message distribution.
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: REDIS_URL
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
