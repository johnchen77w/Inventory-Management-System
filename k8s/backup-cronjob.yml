apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: inventory
spec:
  schedule: "0 2 * * *"  # Daily at 2:00 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  FILENAME="inventory_backup_${TIMESTAMP}.sql.gz"
                  echo "Starting backup: ${FILENAME}"
                  pg_dump -h postgres -U $POSTGRES_USER -d $POSTGRES_DB | gzip > /tmp/${FILENAME}
                  echo "Backup completed: $(du -h /tmp/${FILENAME})"
                  # To upload to DigitalOcean Spaces, uncomment and configure:
                  # apk add --no-cache aws-cli
                  # aws s3 cp /tmp/${FILENAME} s3://inventory-backups/${FILENAME} \
                  #   --endpoint-url https://tor1.digitaloceanspaces.com
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: inventory-secrets
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: inventory-secrets
                      key: POSTGRES_DB
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: inventory-secrets
                      key: POSTGRES_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
