apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: inventory
  labels:
    app: inventory-api
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    app: inventory-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: inventory
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inventory-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: inventory-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: inventory-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: REDIS_URL
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: DEFAULT_ADMIN_EMAIL
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: DEFAULT_ADMIN_PASSWORD
            - name: DEFAULT_ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: DEFAULT_ADMIN_NAME
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: SENDGRID_API_KEY
            - name: ALERT_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: ALERT_FROM_EMAIL
            - name: LOW_STOCK_FUNCTION_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: LOW_STOCK_FUNCTION_URL
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
